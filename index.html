<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poké Roulette</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-width: 320px;
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #e0e0e0;
  --text-dim: #888;
  --border: #2a2a4a;
  --confirm: #27C76A;
  --return: #AAAAAA;
  --remove: #E24B4A;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
  min-width: 0;
}

/* ── MAIN AREA ── */
#main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}
.screen.fast-transition {
  transition: opacity 0.25s ease;
}

/* ── ROULETTE SCREEN ── */
#roulette-screen { gap: clamp(6px, 1.5vmin, 14px); padding: 16px; }

#wheel-container {
  position: relative;
  flex: 1;
  min-height: 0;
  aspect-ratio: 1;
  max-width: 100%;
  width: auto;
  cursor: pointer;
  user-select: none;
}

#wheel-svg {
  width: 100%;
  height: 100%;
}

#wheel-center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  width: 35%;
}

#wheel-center-text .pokemon-name {
  font-size: 1.1rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 6px;
}

#wheel-center-text .spin-prompt {
  font-size: 0.85rem;
  color: var(--text-dim);
}

#pointer {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 20px solid #fff;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
  z-index: 10;
}

#empty-wheel-msg {
  text-align: center;
  color: var(--text-dim);
  font-size: 1rem;
  max-width: 300px;
  line-height: 1.5;
}

/* ── TYPE BADGES ── */
.card-meta {
  display: flex;
  align-items: center;
  gap: clamp(6px, 1.5vmin, 12px);
  flex-wrap: wrap;
  justify-content: center;
}

.type-badges {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
}

.gen-label {
  font-size: clamp(0.7rem, 1.5vmin, 0.85rem);
  font-weight: 600;
  color: var(--text-dim);
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  white-space: nowrap;
  background: var(--bg);
}
.type-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

/* ── SILHOUETTE SCREEN ── */

.sprite-wrapper {
  position: relative;
  flex: 1;
  min-height: 0;
  aspect-ratio: 1;
  max-width: 100%;
  width: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
}

.sprite-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.sprite-wrapper .question-mark {
  position: absolute;
  font-size: clamp(2rem, 20%, 6rem);
  font-weight: 900;
  color: rgba(255,255,255,0.15);
  pointer-events: none;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.sprite-wrapper .spinner {
  width: 48px;
  height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* hint floats inside the sprite as a subtle overlay */
#silhouette-hint {
  position: absolute;
  bottom: 8px;
  left: 0; right: 0;
  text-align: center;
  font-size: clamp(0.65rem, 1.5vmin, 0.85rem);
  color: rgba(255,255,255,0.35);
  pointer-events: none;
}

/* ghost elements occupy space without being visible */
.ghost {
  visibility: hidden;
  pointer-events: none;
  user-select: none;
}

/* ── REVEAL SCREEN ── */
/* both screens share identical layout so the sprite occupies the same space */
#silhouette-screen,
#reveal-screen {
  gap: clamp(6px, 1.5vmin, 14px);
  padding: 16px;
}

#reveal-name-row {
  display: flex;
  align-items: center;
  width: 100%;
}

#reveal-name-row #reveal-name {
  flex: 1;
  text-align: center;
}

#btn-close-reveal,
#btn-bio {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text-dim);
  font-size: 0.85rem;
  cursor: pointer;
  line-height: 1;
}
#btn-close-reveal:hover,
#btn-bio:hover { color: var(--text); border-color: var(--text-dim); }
#btn-bio.active { border-color: var(--text-dim); color: var(--text); }

#reveal-bio {
  display: none;
  flex-direction: column;
  gap: 6px;
  width: 100%;
  max-width: 320px;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 8px;
  font-size: clamp(0.75rem, 1.8vmin, 0.85rem);
}
#reveal-bio.visible { display: flex; }
#reveal-bio .bio-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
#reveal-bio .bio-label { color: var(--text-dim); }
#reveal-bio .bio-value { font-weight: 600; text-align: right; }

.dex-entry {
  font-size: clamp(0.75rem, 1.8vmin, 0.9rem);
  color: var(--text-dim);
  text-align: center;
  font-style: italic;
  line-height: 1.5;
  padding: 0 8px;
  max-width: 360px;
}
.dex-entry.blurred {
  filter: blur(5px);
  cursor: pointer;
  user-select: none;
}

.pokemon-display-name {
  font-size: clamp(1rem, 4vmin, 2.2rem);
  font-weight: 800;
  letter-spacing: 0.02em;
  text-align: center;
  position: relative;
  z-index: 1;
}

.action-buttons {
  display: flex;
  gap: clamp(6px, 1.5vmin, 16px);
  margin-top: clamp(4px, 1vmin, 8px);
  flex-wrap: wrap;
  justify-content: center;
}

.action-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: clamp(6px, 1.5vmin, 12px) clamp(12px, 3vmin, 28px);
  border: none;
  border-radius: 8px;
  font-size: clamp(0.75rem, 2vmin, 1rem);
  font-weight: 600;
  cursor: pointer;
  color: #fff;
  transition: filter 0.15s, transform 0.1s;
}
.action-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
.action-btn:active { transform: translateY(0); }
.btn-confirm { background: var(--confirm); }
.btn-return  { background: var(--return); }
.btn-remove  { background: var(--remove); }

/* ── SIDEBAR ── */
#sidebar {
  width: clamp(220px, 28vw, 320px);
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: row;
  overflow: hidden;
  flex-shrink: 0;
  transition: width 0.25s ease;
}

#sidebar.collapsed { width: 28px; }

#sidebar-tabbar {
  width: 28px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--surface2);
  border-right: 1px solid var(--border);
}

#sidebar-toggle {
  width: 28px;
  height: 32px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 0;
}
#sidebar-toggle:hover { color: var(--text); background: rgba(255,255,255,0.05); }

.tab-btn {
  width: 28px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 10px 0;
}
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.tab-btn.active { color: var(--text); background: rgba(255,255,255,0.12); }

#sidebar-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

#view-lists {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

#view-config {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  padding: 12px;
  gap: 16px;
  min-width: 0;
}

/* ── CONFIG PANEL ── */
.config-section { display: flex; flex-direction: column; gap: 8px; }

.config-section-title {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.hint-row { display: flex; flex-direction: column; gap: 6px; padding: 4px 0; }
.hint-row-label { font-size: 0.88rem; font-weight: 600; }
.hint-options { display: flex; gap: 4px; }

.hint-radio-label {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5px 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.78rem;
  cursor: pointer;
  color: var(--text-dim);
}
.hint-radio-label.selected { background: var(--surface2); border-color: var(--text-dim); color: var(--text); }
.hint-radio-label { border-style: dashed; }
.hint-radio-label.default { border-style: solid; }
.hint-radio-label input { display: none; }

#gen-checkboxes { display: flex; flex-wrap: wrap; gap: 6px; }

.gen-check-label {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.8rem;
  cursor: pointer;
  color: var(--text-dim);
}
.gen-check-label.selected { background: var(--surface2); border-color: var(--text-dim); color: var(--text); }
.gen-check-label input { display: none; }

#import-export-area {
  width: 100%;
  height: 90px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 0.72rem;
  font-family: monospace;
  padding: 8px;
  resize: vertical;
  outline: none;
  line-height: 1.5;
}

.config-btn-row { display: flex; gap: 8px; }

.config-btn {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text);
  font-size: 0.78rem;
  cursor: pointer;
}
.config-btn:hover { background: rgba(255,255,255,0.08); }

/* ── HINT REVEAL BUTTON ── */
.hint-reveal-btn {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface2);
  color: var(--text-dim);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}
.hint-reveal-btn:hover { color: var(--text); border-color: var(--text-dim); }

/* ── SILHOUETTE HINTS LARGER + ABOVE GLOW ── */
#silhouette-screen .type-badge, #reveal-screen .type-badge { font-size: 0.9rem; padding: 5px 14px; }
#silhouette-screen .gen-label,  #reveal-screen .gen-label  { font-size: 0.9rem; padding: 5px 14px; }

#filter-bar {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

#filter-bar input[type="text"] {
  width: 100%;
  padding: 5px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 0.8rem;
}

#filter-row2 {
  display: flex;
  gap: 4px;
  align-items: center;
}

.sort-radio-label {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 4px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.78rem;
  cursor: pointer;
  color: var(--text-dim);
}
.sort-radio-label.selected { background: var(--surface2); border-color: var(--text-dim); color: var(--text); }
.sort-radio-label input { display: none; }

#sort-dir {
  padding: 4px 6px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  font-size: 0.85rem;
  cursor: pointer;
  line-height: 1;
  transition: transform 0.15s;
  flex-shrink: 0;
}
#sort-dir:hover { color: var(--text); border-color: var(--text-dim); }
#sort-dir.desc { transform: scaleY(-1); }

#filter-clear {
  padding: 4px 8px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  font-size: 0.75rem;
  cursor: pointer;
  white-space: nowrap;
}
#filter-clear:hover { color: var(--text); border-color: var(--text-dim); }

.lists-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.list-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border);
  min-height: 0;
}
.list-panel:last-child { border-bottom: none; }

.list-header {
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
  flex-shrink: 0;
  user-select: none;
  cursor: pointer;
}

.list-panel.collapsed .list-body { display: none; }
.list-panel.collapsed { flex: 0 0 auto; }
.list-panel.collapsed .list-collapse-arrow { transform: rotate(-90deg); }

.list-title {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.list-count {
  font-size: 0.75rem;
  color: var(--text-dim);
}

.edit-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 2px 6px;
  font-size: 0.9rem;
  border-radius: 3px;
}
.edit-btn.is-pen .pen-icon { display: inline-block; transform: rotate(135deg); }
.edit-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.edit-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.edit-btn[title] { position: relative; }

.list-collapse-arrow {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-right: 2px;
  flex-shrink: 0;
  display: inline-block;
  line-height: 1;
}

.list-body {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.list-body::-webkit-scrollbar { width: 6px; }
.list-body::-webkit-scrollbar-track { background: transparent; }
.list-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.list-textarea {
  width: 100%;
  height: 100%;
  background: var(--bg);
  border: none;
  color: var(--text);
  font-size: 0.8rem;
  font-family: monospace;
  padding: 8px;
  resize: none;
  outline: none;
  line-height: 1.6;
}

/* ── LIST ENTRIES ── */
.entry-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  font-size: 0.8rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: default;
}
.entry-row:hover { background: rgba(255,255,255,0.04); }
.entry-row.dragging { opacity: 0.4; }
.entry-row.drag-over { border-top: 2px solid var(--confirm); }

.entry-row[draggable="true"] { cursor: grab; }
.entry-row[draggable="true"]:active { cursor: grabbing; }

.entry-row.unknown { background: rgba(255, 200, 0, 0.12); }
.entry-row.duplicate { background: rgba(226, 75, 74, 0.15); }
.entry-row.active { background: rgba(255,255,255,0.08); }

.type-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
}
.type-dot.split {
  background: linear-gradient(135deg, var(--c1) 50%, var(--c2) 50%);
}

.entry-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-gen { font-size: 0.65rem; color: var(--text-dim); flex-shrink: 0; }
.entry-error { font-size: 0.65rem; color: #ffc107; margin-left: auto; flex-shrink: 0; }
.entry-dup-error { font-size: 0.65rem; color: var(--remove); margin-left: auto; flex-shrink: 0; }

/* ── DROP ZONES ── */
.drop-zone {
  min-height: 8px;
  transition: background 0.1s;
}
.drop-zone.drag-active { background: rgba(39, 199, 106, 0.2); min-height: 20px; }

/* ── RESET BUTTON ── */
#reset-btn {
  margin: 8px 12px;
  padding: 6px 12px;
  background: none;
  border: 1px solid var(--remove);
  border-radius: 4px;
  color: var(--remove);
  font-size: 0.75rem;
  cursor: pointer;
  flex-shrink: 0;
}
#reset-btn:hover { background: rgba(226,75,74,0.1); }
#reset-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  .screen { transition: none !important; }
  .action-btn { transition: none !important; }
  #sidebar { transition: none !important; }
  * { animation-duration: 0.001ms !important; }
}
</style>
</head>
<body>

<div id="main">
  <!-- Roulette Screen -->
  <div id="roulette-screen" class="screen active">
    <div id="wheel-container">
      <div id="pointer"></div>
      <svg id="wheel-svg" viewBox="-260 -260 520 520" xmlns="http://www.w3.org/2000/svg">
        <defs id="wheel-defs"></defs>
        <g id="wheel-group"></g>
        <circle id="wheel-hole" cx="0" cy="0" r="94" fill="var(--bg)"/>
      </svg>
      <div id="wheel-center-text"></div>
    </div>
    <div id="empty-wheel-msg" style="display:none">
      No Pokémon in the viable list.<br>Add some to get started.
    </div>
  </div>

  <!-- Silhouette Screen -->
  <div id="silhouette-screen" class="screen">
    <div id="silhouette-name-area" class="pokemon-display-name"></div>
    <div class="sprite-wrapper" id="silhouette-wrapper">
      <div class="spinner" id="silhouette-spinner"></div>
    </div>
    <div class="card-meta">
      <span id="silhouette-gen" class="gen-label"></span>
      <div id="silhouette-types" class="type-badges"></div>
    </div>
    <div id="silhouette-dex"></div>
    <div class="action-buttons">
      <button class="action-btn btn-return" id="btn-reveal-all">Reveal all</button>
    </div>
  </div>

  <!-- Reveal Screen -->
  <div id="reveal-screen" class="screen">
    <div id="reveal-name-row">
      <button id="btn-bio" title="Biology">📖</button>
      <div id="reveal-name" class="pokemon-display-name"></div>
      <button id="btn-close-reveal" title="Return to roulette">✕</button>
    </div>
    <div class="sprite-wrapper" id="reveal-wrapper">
      <img id="reveal-img" src="" alt="">
    </div>
    <div id="reveal-bio"></div>
    <div class="card-meta">
      <span id="reveal-gen" class="gen-label"></span>
      <div id="reveal-types" class="type-badges"></div>
    </div>
    <div id="reveal-dex"></div>
    <div class="action-buttons">
      <button class="action-btn btn-confirm" id="btn-confirm" title="Remove from roulette as guessed">✓ Guessed</button>
      <button class="action-btn btn-remove"  id="btn-remove"  title="Remove from roulette as failed">✕ Failed</button>
    </div>
  </div>
</div>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-tabbar">
    <button id="sidebar-toggle" title="Collapse sidebar">›</button>
    <button class="tab-btn active" id="tab-lists" title="Lists">≡</button>
    <button class="tab-btn" id="tab-config" title="Config">⚙</button>
  </div>
  <div id="sidebar-content">

  <!-- Lists view -->
  <div id="view-lists">
  <div id="filter-bar">
    <input type="text" id="filter-name" placeholder="Filter by name…">
    <div id="filter-row2">
      <label class="sort-radio-label"><input type="radio" name="sort-order" value="id"> ID</label>
      <label class="sort-radio-label"><input type="radio" name="sort-order" value="name"> Name</label>
      <label class="sort-radio-label"><input type="radio" name="sort-order" value="type"> Type</label>

<script>
'use strict';

// ── TYPE COLORS ──
const TYPE_COLORS = {
  Normal:   '#A8A878', Fire:     '#F08030', Water:    '#6890F0',
  Electric: '#F8D030', Grass:    '#78C850', Ice:      '#98D8D8',
  Fighting: '#C03028', Poison:   '#A040A0', Ground:   '#E0C068',
  Flying:   '#A890F0', Psychic:  '#F85888', Bug:      '#A8B820',
  Rock:     '#B8A038', Ghost:    '#705898', Dragon:   '#7038F8',
  Dark:     '#705848', Steel:    '#B8B8D0', Fairy:    '#EE99AC',
};

const STORAGE_KEY = 'pokeroulette_lists';
const SIDEBAR_KEY = 'pokeroulette_sidebar_collapsed';
const COLLAPSE_KEY = 'pokeroulette_panels_collapsed';
const CONFIG_KEY   = 'pokeroulette_config';
const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ── STATE ──
let allPokemon = [];           // full list from pokemon.json
let pokemonByName = new Map(); // normalized name -> pokemon obj
let lists = { viable: [], guessed: [], removed: [] }; // arrays of raw strings
let validatedEntries = { viable: [], guessed: [], removed: [] }; // [{raw, status, pokemon}]

let currentScreen = 'roulette'; // 'roulette' | 'silhouette' | 'reveal'
let selectedPokemon = null;
let revealState = { name: false, types: false, gen: false };
let editMode = { viable: false, guessed: false, removed: false };
let editModeFilteredOut = { viable: [], guessed: [], removed: [] };
let sidebarCollapsed = false;
let panelCollapsed = { viable: false, guessed: false, removed: false };
let currentTab = 'lists';
let config = {
  hints: { name: 'hidden', sprite: 'hidden', types: 'hidden', gen: 'hidden', dex: 'hidden' },
  gens: null,
};

// Wheel animation
let wheelAngle = 0;       // current rotation in radians
let wheelVelocity = 0;    // rad/s
let spinState = 'idle';   // 'idle' | 'spinning' | 'settled'
let winner = null;
let animFrame = null;
let lastTimestamp = null;
let settleTimeout = null;

// ── FILTER / SORT STATE ──
let filters = { name: '' };
let sortOrder = 'none';
let sortAsc = true;
let animateNextRender = false;
const pokedexCache = new Map();
const bioCache = new Map();

// ── INIT ──
async function init() {
  try {
    const res = await fetch('pokemon.json');
    allPokemon = await res.json();
  } catch (e) {
    document.getElementById('main').innerHTML =
      '<p style="color:#E24B4A;text-align:center">Failed to load pokemon.json.<br>Run build-pokemon-json.js first.</p>';
    return;
  }

  // Build lookup map with normalized names
  for (const p of allPokemon) {
    pokemonByName.set(normalizeName(p.name), p);
  }

  loadSidebarState();
  loadPanelCollapseState();
  loadConfig();
  loadLists();
  validateAll();
  renderSidebar();
  buildConfigPanel();
  buildWheel();
  startIdleSpin();
  bindEvents();
}

// ── PERSISTENCE ──
function loadLists() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      lists = JSON.parse(raw);
      // ensure all three keys exist
      lists.viable   = lists.viable   || [];
      lists.guessed  = lists.guessed  || [];
      lists.removed  = lists.removed  || [];
      return;
    } catch(e) {}
  }
  // First load: seed from pokemon.json
  lists = {
    viable:  allPokemon.map(p => p.name),
    guessed: [],
    removed: [],
  };
  saveLists();
}

function saveLists() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(lists));
}

// ── SIDEBAR COLLAPSE ──
function loadSidebarState() {
  sidebarCollapsed = localStorage.getItem(SIDEBAR_KEY) === 'true';
  applySidebarState();
}

function applySidebarState() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle');
  if (sidebarCollapsed) {
    sidebar.classList.add('collapsed');
    btn.textContent = '‹';
    btn.title = 'Expand sidebar';
  } else {
    sidebar.classList.remove('collapsed');
    btn.textContent = '›';
    btn.title = 'Collapse sidebar';
  }
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  localStorage.setItem(SIDEBAR_KEY, sidebarCollapsed);
  applySidebarState();
}

// ── PANEL COLLAPSE ──
function loadPanelCollapseState() {
  try {
    const raw = localStorage.getItem(COLLAPSE_KEY);
    if (raw) Object.assign(panelCollapsed, JSON.parse(raw));
  } catch(e) {}
  for (const listName of ['viable', 'guessed', 'removed']) {
    applyPanelCollapse(listName);
  }
}

function applyPanelCollapse(listName) {
  document.getElementById(`panel-${listName}`)
    .classList.toggle('collapsed', panelCollapsed[listName]);
}

function togglePanelCollapse(listName) {
  if (editMode[listName]) return;
  panelCollapsed[listName] = !panelCollapsed[listName];
  applyPanelCollapse(listName);
  localStorage.setItem(COLLAPSE_KEY, JSON.stringify(panelCollapsed));
}

// ── CONFIG ──
function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.hints) config.hints = { ...config.hints, ...saved.hints };
      if (saved.gens !== undefined) config.gens = saved.gens;
    }
  } catch(e) {}
}

function saveConfig() {
  localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
}

function buildConfigPanel() {
  const allGens = [...new Set(allPokemon.map(p => p.gen))].sort((a, b) => a - b);

  if (config.gens === null) {
    config.gens = allGens;
    saveConfig();
  }

  // Gen checkboxes
  const container = document.getElementById('gen-checkboxes');
  container.innerHTML = '';
  for (const gen of allGens) {
    const label = document.createElement('label');
    label.className = 'gen-check-label' + (config.gens.includes(gen) ? ' selected' : '');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = gen;
    cb.checked = config.gens.includes(gen);
    cb.addEventListener('change', () => {
      if (cb.checked) {
        if (!config.gens.includes(gen)) config.gens.push(gen);
      } else {
        config.gens = config.gens.filter(g => g !== gen);
      }
      label.classList.toggle('selected', cb.checked);
      saveConfig();
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(`Gen ${gen}`));
    container.appendChild(label);
  }

  // Hint radio selected states
  for (const key of ['name', 'sprite', 'types', 'gen', 'dex']) {
    document.querySelectorAll(`input[name="hint-${key}"]`).forEach(radio => {
      const isSelected = radio.value === config.hints[key];
      radio.checked = isSelected;
      radio.closest('.hint-radio-label').classList.toggle('selected', isSelected);
    });
  }
}

function switchTab(name) {
  currentTab = name;
  document.getElementById('view-lists').style.display = name === 'lists' ? 'flex' : 'none';
  document.getElementById('view-config').style.display = name === 'config' ? 'flex' : 'none';
  document.getElementById('tab-lists').classList.toggle('active', name === 'lists');
  document.getElementById('tab-config').classList.toggle('active', name === 'config');
  if (sidebarCollapsed) {
    sidebarCollapsed = false;
    localStorage.setItem(SIDEBAR_KEY, false);
    applySidebarState();
  }
}

function exportData() {
  const idLists = {};
  for (const ln of ['viable', 'guessed', 'removed']) {
    idLists[ln] = validatedEntries[ln]
      .filter(e => e.status === 'valid')
      .map(e => e.pokemon.id);
  }
  return btoa(JSON.stringify({ version: 2, lists: idLists, config }));
}

function importData(str) {
  try {
    const data = JSON.parse(atob(str.trim()));
    if (data.lists) {
      for (const ln of ['viable', 'guessed', 'removed']) {
        lists[ln] = (data.lists[ln] || [])
          .map(id => allPokemon.find(p => p.id === id)?.name)
          .filter(Boolean);
      }
      saveLists();
    }
    if (data.config) {
      if (data.config.hints) config.hints = { ...config.hints, ...data.config.hints };
      if (data.config.gens)  config.gens  = data.config.gens;
      saveConfig();
    }
    validateAll();
    renderSidebar();
    buildConfigPanel();
    buildWheel();
    return true;
  } catch(e) { return false; }
}

// ── NAME NORMALIZATION ──
function normalizeName(s) {
  return s.toLowerCase()
    .replace(/♀/g, 'f')
    .replace(/♂/g, 'm')
    .replace(/[-'.]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function matchPokemon(raw) {
  const n = normalizeName(raw);
  return pokemonByName.get(n) || null;
}

// ── VALIDATION ──
function validateAll() {
  // First pass: resolve each raw to a pokemon
  const allResolved = {};
  for (const listName of ['viable', 'guessed', 'removed']) {
    allResolved[listName] = lists[listName].map(raw => ({
      raw,
      pokemon: matchPokemon(raw),
    }));
  }

  // Find duplicates across all lists
  const seenNames = new Map(); // normalized -> [{listName, idx}]
  for (const listName of ['viable', 'guessed', 'removed']) {
    for (let i = 0; i < allResolved[listName].length; i++) {
      const { pokemon } = allResolved[listName][i];
      if (!pokemon) continue;
      const key = pokemon.id;
      if (!seenNames.has(key)) seenNames.set(key, []);
      seenNames.get(key).push({ listName, idx: i });
    }
  }

  const duplicateKeys = new Set();
  for (const [key, locs] of seenNames) {
    if (locs.length > 1) duplicateKeys.add(key);
  }

  // Second pass: assign status
  for (const listName of ['viable', 'guessed', 'removed']) {
    validatedEntries[listName] = allResolved[listName].map(({ raw, pokemon }) => {
      let status;
      if (!pokemon) {
        status = 'unknown';
      } else if (duplicateKeys.has(pokemon.id)) {
        status = 'duplicate';
      } else {
        status = 'valid';
      }
      return { raw, status, pokemon };
    });
    // Sort: invalid first, then valid (preserve order within each group)
    validatedEntries[listName].sort((a, b) => {
      const rankA = a.status === 'valid' ? 1 : 0;
      const rankB = b.status === 'valid' ? 1 : 0;
      return rankA - rankB;
    });
  }
}

function getValidViable() {
  return validatedEntries.viable.filter(e => e.status === 'valid').map(e => e.pokemon);
}

// ── WHEEL BUILDING ──
function buildWheel() {
  const valid = getValidViable();
  const group = document.getElementById('wheel-group');
  const defs = document.getElementById('wheel-defs');
  const centerText = document.getElementById('wheel-center-text');
  const emptyMsg = document.getElementById('empty-wheel-msg');
  const container = document.getElementById('wheel-container');

  group.innerHTML = '';
  defs.innerHTML = '';

  if (valid.length === 0) {
    container.style.display = 'none';
    emptyMsg.style.display = 'block';
    return;
  }
  container.style.display = 'block';
  emptyMsg.style.display = 'none';

  const R = 250;
  const anglePerSlice = (2 * Math.PI) / valid.length;

  // Create stripe patterns for dual-type pokemon
  const patternCache = new Map();

  for (let i = 0; i < valid.length; i++) {
    const p = valid[i];
    const startAngle = i * anglePerSlice - Math.PI / 2;
    const endAngle = startAngle + anglePerSlice;

    const c1 = TYPE_COLORS[p.type1] || '#888';
    const c2 = p.type2 ? (TYPE_COLORS[p.type2] || '#888') : null;

    let fill;
    if (!c2) {
      fill = c1;
    } else {
      const patKey = `${c1}_${c2}`;
      if (!patternCache.has(patKey)) {
        const pid = `pat_${patternCache.size}`;
        const pat = document.createElementNS('http://www.w3.org/2000/svg', 'pattern');
        pat.setAttribute('id', pid);
        pat.setAttribute('patternUnits', 'userSpaceOnUse');
        pat.setAttribute('width', '8');
        pat.setAttribute('height', '8');
        pat.setAttribute('patternTransform', 'rotate(45)');
        pat.innerHTML = `
          <rect width="8" height="8" fill="${c1}"/>
          <rect width="4" height="8" fill="${c2}"/>
        `;
        defs.appendChild(pat);
        patternCache.set(patKey, pid);
      }
      fill = `url(#${patternCache.get(patKey)})`;
    }

    let el;
    if (valid.length === 1) {
      el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      el.setAttribute('cx', 0);
      el.setAttribute('cy', 0);
      el.setAttribute('r', R);
    } else {
      const x1 = Math.cos(startAngle) * R;
      const y1 = Math.sin(startAngle) * R;
      const x2 = Math.cos(endAngle) * R;
      const y2 = Math.sin(endAngle) * R;
      const largeArc = anglePerSlice > Math.PI ? 1 : 0;
      el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      el.setAttribute('d', `M 0 0 L ${x1} ${y1} A ${R} ${R} 0 ${largeArc} 1 ${x2} ${y2} Z`);
    }
    el.setAttribute('fill', fill);
    el.setAttribute('data-index', i);
    group.appendChild(el);
  }

  updateCenterText();
}

function updateCenterText() {
  const centerText = document.getElementById('wheel-center-text');
  if (spinState === 'idle') {
    centerText.innerHTML = '<div class="spin-prompt">Click to spin</div>';
  } else if (spinState === 'settled') {
    centerText.innerHTML = '';
  } else {
    centerText.innerHTML = '';
  }
}

function applyWheelRotation() {
  const group = document.getElementById('wheel-group');
  const deg = (wheelAngle * 180 / Math.PI);
  group.setAttribute('transform', `rotate(${deg})`);
}

// ── IDLE SPIN ──
function startIdleSpin() {
  if (REDUCED_MOTION) return;
  if (spinState !== 'idle') return;
  wheelVelocity = (2 * Math.PI) / 60; // 1 RPM
  if (!animFrame) {
    lastTimestamp = null;
    animFrame = requestAnimationFrame(animLoop);
  }
}

function stopAnimation() {
  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
}

function animLoop(ts) {
  if (!lastTimestamp) lastTimestamp = ts;
  const dt = Math.min((ts - lastTimestamp) / 1000, 0.1);
  lastTimestamp = ts;

  if (spinState === 'idle') {
    wheelAngle += wheelVelocity * dt;
    applyWheelRotation();
    animFrame = requestAnimationFrame(animLoop);
  } else if (spinState === 'spinning') {
    // Cubic ease-out friction
    const friction = 0.98;
    wheelVelocity *= Math.pow(friction, dt * 60);
    wheelAngle += wheelVelocity * dt;
    applyWheelRotation();

    if (wheelVelocity < 0.05) {
      settleWheel();
    } else {
      animFrame = requestAnimationFrame(animLoop);
    }
  }
}

function readPointerWinner() {
  const valid = getValidViable();
  if (valid.length === 0) return null;
  const anglePerSlice = (2 * Math.PI) / valid.length;
  // Pointer is at 12 o'clock. In unrotated wheel space, that maps to angle (-wheelAngle).
  // Segments start at -PI/2, so compute offset from -PI/2:
  const relAngle = ((-wheelAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const idx = Math.floor(relAngle / anglePerSlice) % valid.length;
  return valid[idx];
}

function settleWheel() {
  stopAnimation();
  winner = readPointerWinner();
  if (!winner) return;

  spinState = 'settled';
  updateCenterText();

  settleTimeout = setTimeout(() => {
    showSilhouette(winner);
  }, 600);
}

// ── SPIN ACTIVATION ──
function activateSpin() {
  const valid = getValidViable();
  if (valid.length === 0) return;

  if (spinState === 'idle') {
    winner = null;
    spinState = 'spinning';
    wheelVelocity = 15 + Math.random() * 5; // fast initial snap
    updateCenterText();
    if (!animFrame) {
      lastTimestamp = null;
      animFrame = requestAnimationFrame(animLoop);
    }
  } else if (spinState === 'spinning') {
    // Add velocity scaling with current speed
    const boost = 2 + wheelVelocity * 0.3;
    wheelVelocity += boost;
  }
  // no-op if settled
}

// ── SCREEN TRANSITIONS ──
function showScreen(name) {
  const screens = document.querySelectorAll('.screen');
  screens.forEach(s => { s.classList.remove('active'); });

  const target = document.getElementById(`${name}-screen`);
  if (name === 'reveal') {
    target.classList.add('fast-transition');
  } else {
    target.classList.remove('fast-transition');
  }
  target.classList.add('active');
  currentScreen = name;
  updateEditLock();
}

function updateEditLock() {
  const locked = currentScreen !== 'roulette';
  const tooltip = locked ? 'Return to roulette to edit lists' : 'Edit list';
  for (const name of ['viable', 'guessed', 'removed']) {
    const btn = document.getElementById(`edit-${name}`);
    btn.disabled = locked;
    btn.title = tooltip;
  }
  document.getElementById('reset-btn').disabled = locked;
}

function applyDexText(el, p, redact) {
  const raw = pokedexCache.get(p.id);
  if (!raw) return;
  el.textContent = redact
    ? raw.replace(new RegExp(p.name, 'gi'), '█'.repeat(p.name.length))
    : raw;
}

async function fetchDexEntry(p, el, redact = false) {
  if (pokedexCache.has(p.id)) {
    applyDexText(el, p, redact);
    return;
  }
  el.textContent = '…';
  try {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${p.id}/`);
    const data = await res.json();
    const entry = data.flavor_text_entries.find(e => e.language.name === 'en');
    const text = entry ? entry.flavor_text.replace(/\f/g, ' ').replace(/\u00ad/g, '') : 'No entry found.';
    pokedexCache.set(p.id, text);
    if (selectedPokemon?.id === p.id) applyDexText(el, p, redact);
  } catch {
    el.textContent = 'Failed to load Pokédex entry.';
  }
}

async function fetchBio(p, el) {
  if (bioCache.has(p.id)) {
    renderBio(el, bioCache.get(p.id));
    return;
  }
  el.innerHTML = '<span style="color:var(--text-dim);font-style:italic">…</span>';
  try {
    const [speciesRes, pokemonRes] = await Promise.all([
      fetch(`https://pokeapi.co/api/v2/pokemon-species/${p.id}/`),
      fetch(`https://pokeapi.co/api/v2/pokemon/${p.id}/`),
    ]);
    const [species, pokemon] = await Promise.all([speciesRes.json(), pokemonRes.json()]);
    const genus = species.genera.find(g => g.language.name === 'en')?.genus ?? '—';
    const height = (pokemon.height / 10).toFixed(1) + ' m';
    const weight = (pokemon.weight / 10).toFixed(1) + ' kg';
    const abilities = pokemon.abilities
      .sort((a, b) => a.slot - b.slot)
      .map(a => a.ability.name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())
        + (a.is_hidden ? ' (hidden)' : ''))
      .join(', ');
    const data = { genus, height, weight, abilities };
    bioCache.set(p.id, data);
    if (selectedPokemon?.id === p.id) renderBio(el, data);
  } catch {
    el.innerHTML = '<span style="color:var(--text-dim);font-style:italic">Failed to load.</span>';
  }
}

function renderBio(el, data) {
  el.innerHTML = '';
  for (const [label, value] of [['Category', data.genus], ['Height', data.height], ['Weight', data.weight], ['Abilities', data.abilities]]) {
    const row = document.createElement('div');
    row.className = 'bio-row';
    row.innerHTML = `<span class="bio-label">${label}</span><span class="bio-value">${value}</span>`;
    el.appendChild(row);
  }
}

function revealNextHint() {
  const p = selectedPokemon;
  const order = ['gen', 'types', 'dex', 'sprite', 'name'];
  for (const key of order) {
    if (revealState[key]) continue; // already revealed or not a prerequisite
    if (key === 'gen') {
      const genEl = document.getElementById('silhouette-gen');
      genEl.style.cssText = '';
      genEl.textContent = `Gen ${p.gen}`;
      revealState.gen = true;
    } else if (key === 'types') {
      const typesEl = document.getElementById('silhouette-types');
      typesEl.innerHTML = '';
      const b1 = document.createElement('span');
      b1.className = 'type-badge';
      b1.style.background = TYPE_COLORS[p.type1] || '#888';
      b1.textContent = p.type1;
      typesEl.appendChild(b1);
      if (p.type2) {
        const b2 = document.createElement('span');
        b2.className = 'type-badge';
        b2.style.background = TYPE_COLORS[p.type2] || '#888';
        b2.textContent = p.type2;
        typesEl.appendChild(b2);
      }
      revealState.types = true;
    } else if (key === 'dex') {
      const dexEl = document.getElementById('silhouette-dex');
      dexEl.classList.remove('blurred');
      dexEl.onclick = null;
      if (!pokedexCache.has(p.id)) fetchDexEntry(p, dexEl, false);
      else applyDexText(dexEl, p, false);
      revealState.dex = true;
    } else if (key === 'sprite') {
      const wrapper = document.getElementById('silhouette-wrapper');
      const img = wrapper.querySelector('img');
      if (img) img.style.filter = '';
      wrapper.querySelector('.question-mark')?.remove();
      wrapper.style.cursor = '';
      wrapper.onclick = null;
      revealState.sprite = true;
    } else if (key === 'name') {
      const nameArea = document.getElementById('silhouette-name-area');
      nameArea.innerHTML = '';
      nameArea.textContent = p.name;
      const dexEl = document.getElementById('silhouette-dex');
      if (pokedexCache.has(p.id)) applyDexText(dexEl, p, false);
      revealState.name = true;
    }
    checkAllRevealed();
    return;
  }
  // All hints revealed — nothing left to do
}

function checkAllRevealed() {
  if (revealState.name && revealState.sprite && revealState.types && revealState.gen && revealState.dex) showReveal();
}

function showSilhouette(p) {
  selectedPokemon = p;

  revealState = {
    name:   config.hints.name   === 'hidden' ? false : true,
    sprite: config.hints.sprite === 'hidden' ? false : true,
    types:  config.hints.types  !== 'hidden',
    gen:    config.hints.gen    !== 'hidden',
    dex:    config.hints.dex    !== 'hidden',
  };

  // Name area
  const nameArea = document.getElementById('silhouette-name-area');
  nameArea.innerHTML = '';
  if (config.hints.name === 'hidden') {
    const nameBtn = document.createElement('button');
    nameBtn.className = 'hint-reveal-btn';
    nameBtn.textContent = 'Reveal name';
    nameBtn.onclick = () => {
      revealState.name = true;
      nameArea.textContent = p.name;
      const dexEl = document.getElementById('silhouette-dex');
      if (pokedexCache.has(p.id)) applyDexText(dexEl, p, false);
      checkAllRevealed();
    };
    nameArea.appendChild(nameBtn);
  }
  // disabled → nameArea stays empty, not a prerequisite

  // Type badges
  const typesEl = document.getElementById('silhouette-types');
  typesEl.innerHTML = '';
  if (config.hints.types === 'disabled') {
    typesEl.style.display = 'none';
  } else {
    typesEl.style.display = '';
    const renderTypeBadges = () => {
      typesEl.innerHTML = '';
      const b1 = document.createElement('span');
      b1.className = 'type-badge';
      b1.style.background = TYPE_COLORS[p.type1] || '#888';
      b1.textContent = p.type1;
      typesEl.appendChild(b1);
      if (p.type2) {
        const b2 = document.createElement('span');
        b2.className = 'type-badge';
        b2.style.background = TYPE_COLORS[p.type2] || '#888';
        b2.textContent = p.type2;
        typesEl.appendChild(b2);
      }
    };
    if (config.hints.types === 'hidden') {
      const btn = document.createElement('button');
      btn.className = 'hint-reveal-btn';
      btn.textContent = 'Reveal types';
      btn.onclick = () => { revealState.types = true; renderTypeBadges(); checkAllRevealed(); };
      typesEl.appendChild(btn);
    } else {
      renderTypeBadges();
    }
  }

  // Gen label
  const genEl = document.getElementById('silhouette-gen');
  genEl.innerHTML = '';
  if (config.hints.gen === 'disabled') {
    genEl.style.cssText = 'display:none';
  } else {
    const renderGen = () => {
      genEl.style.cssText = '';
      genEl.textContent = `Gen ${p.gen}`;
    };
    if (config.hints.gen === 'hidden') {
      genEl.style.cssText = 'border:none;padding:0;background:none';
      const btn = document.createElement('button');
      btn.className = 'hint-reveal-btn';
      btn.textContent = 'Reveal gen';
      btn.onclick = () => { revealState.gen = true; renderGen(); checkAllRevealed(); };
      genEl.appendChild(btn);
    } else {
      renderGen();
    }
  }

  // Pokédex entry
  const dexEl = document.getElementById('silhouette-dex');
  dexEl.innerHTML = '';
  dexEl.className = '';
  if (config.hints.dex === 'disabled') {
    dexEl.style.display = 'none';
  } else {
    dexEl.style.display = '';
    dexEl.className = 'dex-entry';
    const nameHidden = config.hints.name === 'hidden';
    if (config.hints.dex === 'hidden') {
      dexEl.classList.add('blurred');
      fetchDexEntry(p, dexEl, nameHidden);
      dexEl.onclick = () => {
        dexEl.classList.remove('blurred');
        dexEl.onclick = null;
        revealState.dex = true;
        checkAllRevealed();
      };
    } else {
      fetchDexEntry(p, dexEl, nameHidden);
    }
  }

  const wrapper = document.getElementById('silhouette-wrapper');
  wrapper.innerHTML = '';
  wrapper.onclick = null;
  wrapper.style.cursor = '';

  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  spinner.id = 'silhouette-spinner';
  wrapper.appendChild(spinner);

  const img = document.createElement('img');
  img.src = p.spriteUrl;
  img.alt = '?';
  const spriteHidden = config.hints.sprite === 'hidden';
  img.style.cssText = `${spriteHidden ? 'filter:brightness(0);' : ''} position:absolute; inset:0; width:100%; height:100%; object-fit:contain;`;

  if (spriteHidden) {
    wrapper.style.cursor = 'pointer';
    wrapper.onclick = () => {
      img.style.filter = '';
      wrapper.querySelector('.question-mark')?.remove();
      wrapper.style.cursor = '';
      wrapper.onclick = null;
      revealState.sprite = true;
      checkAllRevealed();
    };
  }

  img.onload = () => {
    document.getElementById('silhouette-spinner')?.remove();
    wrapper.appendChild(img);
    if (spriteHidden) {
      const qm = document.createElement('div');
      qm.className = 'question-mark';
      qm.textContent = '?';
      wrapper.appendChild(qm);
    }
  };
  img.onerror = () => {
    document.getElementById('silhouette-spinner')?.remove();
    const fallback = document.createElement('div');
    fallback.textContent = p.name;
    fallback.style.cssText = 'font-size:1.5rem; font-weight:700;';
    wrapper.appendChild(fallback);
  };

  showScreen('silhouette');
}

function refreshSilhouetteHints() {
  if (!selectedPokemon || currentScreen !== 'silhouette') return;
  showSilhouette(selectedPokemon);
}

function showReveal() {
  const p = selectedPokemon;
  document.getElementById('reveal-name').textContent = p.name;

  const img = document.getElementById('reveal-img');
  img.src = p.spriteUrl;
  img.alt = p.name;
  img.style.filter = '';

  const c1 = TYPE_COLORS[p.type1] || '#888';
  const c2 = p.type2 ? (TYPE_COLORS[p.type2] || '#888') : null;

  const typesEl = document.getElementById('reveal-types');
  typesEl.innerHTML = '';
  const b1 = document.createElement('span');
  b1.className = 'type-badge';
  b1.style.background = c1;
  b1.textContent = p.type1;
  typesEl.appendChild(b1);
  if (p.type2) {
    const b2 = document.createElement('span');
    b2.className = 'type-badge';
    b2.style.background = c2;
    b2.textContent = p.type2;
    typesEl.appendChild(b2);
  }

  document.getElementById('reveal-gen').textContent = `Gen ${p.gen}`;

  const revealDexEl = document.getElementById('reveal-dex');
  revealDexEl.className = 'dex-entry';
  fetchDexEntry(p, revealDexEl);

  const bioEl = document.getElementById('reveal-bio');
  bioEl.classList.remove('visible');
  bioEl.innerHTML = '';
  document.getElementById('btn-bio').classList.remove('active');

  showScreen('reveal');
}

function returnToRoulette() {
  document.querySelectorAll('.entry-row.active').forEach(r => r.classList.remove('active'));
  showScreen('roulette');
  buildWheel();
  spinState = 'idle';
  winner = null;
  wheelVelocity = 0;
  updateCenterText();
  startIdleSpin();
}

// ── LIST ACTIONS ──
function movePokemon(p, targetList) {
  // Remove from all lists
  for (const ln of ['viable', 'guessed', 'removed']) {
    lists[ln] = lists[ln].filter(raw => {
      const matched = matchPokemon(raw);
      return !matched || matched.id !== p.id;
    });
  }
  lists[targetList].push(p.name);
  saveLists();
  validateAll();
  renderSidebar();
}

// ── SIDEBAR RENDERING ──
function renderSidebar() {
  for (const listName of ['viable', 'guessed', 'removed']) {
    if (editMode[listName]) continue; // don't re-render while editing
    renderList(listName);
  }
}

function renderList(listName) {
  const body = document.getElementById(`body-${listName}`);
  const entries = validatedEntries[listName];

  // Apply filters (display only) then sort
  const visible = entries.filter(e => matchesFilter(e)).sort((a, b) => {
    const aErr = a.status !== 'valid', bErr = b.status !== 'valid';
    if (aErr !== bErr) return aErr ? -1 : 1;
    if (sortOrder === 'none' || !a.pokemon || !b.pokemon) return 0;
    const dir = sortAsc ? 1 : -1;
    if (sortOrder === 'name') return dir * a.pokemon.name.localeCompare(b.pokemon.name);
    if (sortOrder === 'type') {
      const t = a.pokemon.type1.localeCompare(b.pokemon.type1);
      if (t !== 0) return dir * t;
      return dir * (a.pokemon.type2 || '').localeCompare(b.pokemon.type2 || '');
    }
    return dir * (a.pokemon.id - b.pokemon.id);
  });

  // Update count
  document.getElementById(`count-${listName}`).textContent =
    `${visible.length} / ${entries.length}`;

  // FLIP: snapshot positions before clearing
  const doFlip = animateNextRender;
  const oldTops = new Map();
  if (doFlip) {
    body.querySelectorAll('.entry-row[data-pokemon-id]').forEach(r => {
      oldTops.set(r.dataset.pokemonId, r.getBoundingClientRect().top);
    });
  }

  body.innerHTML = '';

  for (const entry of visible) {
    const row = document.createElement('div');
    row.className = 'entry-row' + (entry.status !== 'valid' ? ` ${entry.status}` : '');

    if (entry.status === 'valid') {
      row.dataset.pokemonId = entry.pokemon.id;
      if (currentScreen === 'roulette') {
        row.draggable = true;
        row.dataset.fromList = listName;
      }
      if (currentScreen !== 'roulette') row.style.cursor = 'pointer';
      row.addEventListener('click', () => {
        if (row.classList.contains('active')) {
          row.classList.remove('active');
          returnToRoulette();
          return;
        }
        document.querySelectorAll('.entry-row.active').forEach(r => r.classList.remove('active'));
        row.classList.add('active');
        selectedPokemon = entry.pokemon;
        showReveal();
      });
    }

    // Type dot
    const dot = document.createElement('div');
    dot.className = 'type-dot';
    if (entry.pokemon) {
      const c1 = TYPE_COLORS[entry.pokemon.type1] || '#888';
      if (entry.pokemon.type2) {
        dot.classList.add('split');
        dot.style.setProperty('--c1', c1);
        dot.style.setProperty('--c2', TYPE_COLORS[entry.pokemon.type2] || '#888');
      } else {
        dot.style.background = c1;
      }
    } else {
      dot.style.background = '#555';
    }
    row.appendChild(dot);

    const name = document.createElement('div');
    name.className = 'entry-name';
    name.textContent = entry.pokemon ? entry.pokemon.name : entry.raw;
    row.appendChild(name);

    if (entry.pokemon) {
      const gen = document.createElement('div');
      gen.className = 'entry-gen';
      gen.textContent = `G${entry.pokemon.gen}`;
      row.appendChild(gen);
    }

    if (entry.status === 'unknown') {
      const err = document.createElement('div');
      err.className = 'entry-error';
      err.textContent = '?';
      err.title = `Unknown: "${entry.raw}"`;
      row.appendChild(err);
    } else if (entry.status === 'duplicate') {
      const err = document.createElement('div');
      err.className = 'entry-dup-error';
      err.textContent = '⚠';
      err.title = 'Duplicate across lists';
      row.appendChild(err);
    }

    // Drag events
    if (row.draggable) {
      row.addEventListener('dragstart', onDragStart);
      row.addEventListener('dragend', onDragEnd);
    }

    body.appendChild(row);
  }

  // Drop zones between entries
  if (currentScreen === 'roulette') {
    setupDropZones(body, listName);
  }

  // FLIP: play phase
  if (doFlip) {
    animateNextRender = false;
    body.querySelectorAll('.entry-row[data-pokemon-id]').forEach(row => {
      const oldTop = oldTops.get(row.dataset.pokemonId);
      if (oldTop === undefined) return;
      const delta = oldTop - row.getBoundingClientRect().top;
      if (Math.abs(delta) < 1) return;
      row.style.transform = `translateY(${delta}px)`;
      row.style.transition = 'none';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        row.style.transition = 'transform 0.2s ease';
        row.style.transform = '';
        row.addEventListener('transitionend', () => {
          row.style.transform = '';
          row.style.transition = '';
        }, { once: true });
      }));
    });
  }
}

function matchesFilter(entry) {
  if (filters.name) {
    const q = filters.name.toLowerCase();
    const displayName = entry.pokemon ? entry.pokemon.name.toLowerCase() : '';
    const rawName = entry.raw.toLowerCase();
    if (!displayName.includes(q) && !rawName.includes(q)) return false;
  }

  return true;
}

// ── DRAG & DROP ──
let dragData = null;

function onDragStart(e) {
  const row = e.currentTarget;
  dragData = {
    pokemonId: parseInt(row.dataset.pokemonId),
    fromList: row.dataset.fromList,
  };
  row.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', row.dataset.pokemonId);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  dragData = null;
  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-active'));
}

function setupDropZones(body, listName) {
  const rows = body.querySelectorAll('.entry-row');

  // Create drop zone before each row and one at the end
  const makeZone = (beforeRow) => {
    const zone = document.createElement('div');
    zone.className = 'drop-zone';
    zone.dataset.targetList = listName;

    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('drag-active');
    });
    zone.addEventListener('dragleave', () => {
      zone.classList.remove('drag-active');
    });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      zone.classList.remove('drag-active');
      if (!dragData) return;
      const insertBeforeId = beforeRow ? parseInt(beforeRow.dataset.pokemonId) : null;
      handleDrop(listName, dragData, insertBeforeId);
    });

    if (beforeRow) {
      body.insertBefore(zone, beforeRow);
    } else {
      body.appendChild(zone);
    }
  };

  // Re-insert zones between rows
  const existingRows = [...rows];
  existingRows.forEach(row => makeZone(row));
  makeZone(null);

  // Also make the entire body a drop target
  body.addEventListener('dragover', (e) => e.preventDefault());
  body.addEventListener('drop', (e) => {
    e.preventDefault();
    if (!dragData) return;
    handleDrop(listName, dragData, null);
  });
}

function handleDrop(targetList, data, insertBeforeId) {
  const p = allPokemon.find(p => p.id === data.pokemonId);
  if (!p) return;

  if (data.fromList === targetList) {
    if (sortOrder !== 'none') return;
    const lst = lists[targetList];
    const fromIdx = lst.findIndex(raw => matchPokemon(raw)?.id === p.id);
    if (fromIdx === -1) return;
    lst.splice(fromIdx, 1);
    if (insertBeforeId !== null) {
      const toIdx = lst.findIndex(raw => matchPokemon(raw)?.id === insertBeforeId);
      toIdx === -1 ? lst.push(p.name) : lst.splice(toIdx, 0, p.name);
    } else {
      lst.push(p.name);
    }
    saveLists();
    validateAll();
    animateNextRender = true;
    renderSidebar();
    return;
  }

  animateNextRender = true;
  movePokemon(p, targetList);
  buildWheel();
}

// ── EDIT MODE ──
function enterEditMode(listName) {
  if (currentScreen !== 'roulette') return;

  // Auto-expand if collapsed (must happen before editMode is set)
  if (panelCollapsed[listName]) togglePanelCollapse(listName);

  editMode[listName] = true;

  const body = document.getElementById(`body-${listName}`);
  const btn = document.getElementById(`edit-${listName}`);
  btn.textContent = '✓ Done';
  btn.classList.remove('is-pen');

  // Respect filters: show only filtered-in raws, preserve filtered-out raws for merge on exit
  const filteredIn  = validatedEntries[listName].filter(e =>  matchesFilter(e));
  const filteredOut = validatedEntries[listName].filter(e => !matchesFilter(e));
  editModeFilteredOut[listName] = filteredOut.map(e => e.raw);

  const textarea = document.createElement('textarea');
  textarea.className = 'list-textarea';
  textarea.value = filteredIn.map(e => e.raw).join('\n');
  body.innerHTML = '';
  body.appendChild(textarea);
  textarea.focus();

}

function exitEditMode(listName) {
  if (!editMode[listName]) return;
  const body = document.getElementById(`body-${listName}`);
  const textarea = body.querySelector('textarea');
  if (textarea) {
    const editedLines = textarea.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    // Merge: hidden (filtered-out) entries first, then the edited visible entries
    lists[listName] = [...editModeFilteredOut[listName], ...editedLines];
  }
  editMode[listName] = false;
  editModeFilteredOut[listName] = [];

  const btn = document.getElementById(`edit-${listName}`);
  btn.innerHTML = '<span class="pen-icon">✏</span>';
  btn.classList.add('is-pen');

  saveLists();
  validateAll();
  renderSidebar();
  buildWheel();
}

// ── EVENTS ──
function bindEvents() {
  document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);

  // Wheel click
  document.getElementById('wheel-container').addEventListener('click', () => {
    if (currentScreen !== 'roulette') return;
    activateSpin();
  });

  // Reveal all button
  document.getElementById('btn-reveal-all').addEventListener('click', () => {
    showReveal();
  });

  // Action buttons
  document.getElementById('btn-confirm').addEventListener('click', () => {
    movePokemon(selectedPokemon, 'guessed');
    returnToRoulette();
  });
  document.getElementById('btn-bio').addEventListener('click', () => {
    const bioEl = document.getElementById('reveal-bio');
    const btn = document.getElementById('btn-bio');
    const showing = bioEl.classList.toggle('visible');
    btn.classList.toggle('active', showing);
    if (showing && !bioCache.has(selectedPokemon?.id)) fetchBio(selectedPokemon, bioEl);
    else if (showing) renderBio(bioEl, bioCache.get(selectedPokemon.id));
  });

  document.getElementById('btn-close-reveal').addEventListener('click', () => {
    returnToRoulette();
  });
  document.getElementById('btn-remove').addEventListener('click', () => {
    movePokemon(selectedPokemon, 'removed');
    returnToRoulette();
  });

  // Space
  document.addEventListener('keydown', (e) => {
    if (e.code !== 'Space') return;
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    e.preventDefault();
    if (currentScreen === 'roulette') {
      activateSpin();
    } else if (currentScreen === 'silhouette') {
      revealNextHint();
    }
    // disabled on reveal
  });

  // Edit buttons + header collapse toggle
  for (const listName of ['viable', 'guessed', 'removed']) {
    document.getElementById(`edit-${listName}`).addEventListener('click', (e) => {
      e.stopPropagation();
      if (editMode[listName]) {
        exitEditMode(listName);
      } else {
        for (const ln of ['viable', 'guessed', 'removed']) {
          if (ln !== listName && editMode[ln]) exitEditMode(ln);
        }
        enterEditMode(listName);
      }
    });

    document.getElementById(`header-${listName}`).addEventListener('click', (e) => {
      if (e.target.closest('.edit-btn')) return;
      togglePanelCollapse(listName);
    });
  }

  // Filters
  document.getElementById('filter-name').addEventListener('input', (e) => {
    filters.name = e.target.value;
    renderSidebar();
  });

  document.querySelectorAll('input[name="sort-order"]').forEach(radio => {
    radio.addEventListener('change', () => {
      if (!radio.checked) return;
      sortOrder = radio.value;
      document.querySelectorAll('input[name="sort-order"]').forEach(r => {
        r.closest('.sort-radio-label').classList.toggle('selected', r === radio);
      });
      renderSidebar();
    });
  });

  document.getElementById('sort-dir').addEventListener('click', () => {
    sortAsc = !sortAsc;
    document.getElementById('sort-dir').classList.toggle('desc', !sortAsc);
    renderSidebar();
  });

  document.getElementById('filter-clear').addEventListener('click', () => {
    filters = { name: '' };
    sortOrder = 'none';
    sortAsc = true;
    document.getElementById('filter-name').value = '';
    document.querySelectorAll('input[name="sort-order"]').forEach(r => {
      r.checked = false;
      r.closest('.sort-radio-label').classList.remove('selected');
    });
    document.getElementById('sort-dir').classList.remove('desc');
    renderSidebar();
  });

  // Tab switching
  document.getElementById('tab-lists').addEventListener('click', () => switchTab('lists'));
  document.getElementById('tab-config').addEventListener('click', () => switchTab('config'));

  // Hint radios
  for (const key of ['name', 'sprite', 'types', 'gen', 'dex']) {
    document.querySelectorAll(`input[name="hint-${key}"]`).forEach(radio => {
      radio.addEventListener('change', () => {
        if (!radio.checked) return;
        config.hints[key] = radio.value;
        saveConfig();
        document.querySelectorAll(`input[name="hint-${key}"]`).forEach(r => {
          r.closest('.hint-radio-label').classList.toggle('selected', r === radio);
        });
        refreshSilhouetteHints();
      });
    });
  }

  // Export / Import
  document.getElementById('btn-export').addEventListener('click', () => {
    const str = exportData();
    document.getElementById('import-export-area').value = str;
    navigator.clipboard?.writeText(str).catch(() => {});
  });

  document.getElementById('btn-import').addEventListener('click', () => {
    const str = document.getElementById('import-export-area').value.trim();
    if (!str) return;
    if (!importData(str)) alert('Invalid import data.');
    else document.getElementById('import-export-area').value = '';
  });

  // Reset
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (currentScreen !== 'roulette') return;
    if (!confirm('Reset all lists? This cannot be undone.')) return;
    const selectedGens = new Set(config.gens || []);
    lists = {
      viable:  allPokemon.filter(p => selectedGens.size === 0 || selectedGens.has(p.gen)).map(p => p.name),
      guessed: [],
      removed: [],
    };
    saveLists();
    validateAll();
    renderSidebar();
    buildWheel();
    spinState = 'idle';
    winner = null;
    updateCenterText();
  });
}

init();
</script>
</body>
</html>
